name: Add issues to project board

# Auto-adds every newly opened issue in this repo to the
# cordialApple Project-Index board (Project #1).
#
# Setup required once per repo: a secret named ADD_TO_PROJECT_VW
# (a classic PAT with `project` + `repo` scopes). See setup-checklist below.

on:
  issues:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/cordialApple/projects/1
          github-token: ${{ secrets.ADD_TO_PROJECT_VW }}
